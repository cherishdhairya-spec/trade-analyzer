services:
  - type: web
    name: stock-analyzer
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ZERODHA_LIVE_TRADING
        value: false
      - key: SCAN_INTERVAL_HOURS
        value: 6
      - key: RISK_PROFILE
        value: moderate
